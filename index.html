<div id="mainContent">
    <h1>Color Picker</h1>

    <form>
        <h2>RGB to Maxwell Hues Converter</h2>
        <p>Red value:</p> <input id="red">
        <p>Green value:</p> <input id="green">
        <p>Blue value:</p> <input id="blue">
        <br>
        <br>
        <button type="button" onclick="convert()">Convert</button>

        <p id="outputMessage"></p>
        <br>
        <div id="colorBox"></div>
    </form>

    <ul>
        <li><p>GitHub Repository: <a href="https://github.com/Bkain1/color-picker">https://github.com/Bkain1/color-picker</a></p></li>
        <li><p>Pivotal Tracker Project: <a href="https://www.pivotaltracker.com/n/projects/2555163">https://www.pivotaltracker.com/n/projects/2555163</a></p></li>
    </ul>
</div>



<script>
    function convert() {

        // Get the values for the input fields
        let redText = document.getElementById("red").value;
        let greenText = document.getElementById("green").value;
        let blueText = document.getElementById("blue").value;
        let outputText;

        // set min and max
        let min = 0;
        let max = 255;

        let rho = 0;
        let gamma = 0;
        let beta = 0;

        // Test if input is a number
        if (!isNaN(redText) || !isNaN(greenText) || !isNaN(blueText)) {

            // parseInt variables to eliminate floating point errors
            let red = parseInt(redText);
            let green = parseInt(greenText);
            let blue = parseInt(blueText);
            

            // Test if numbers are between min and max
            if (red >= min && red <= max && green >= min && green <= max && blue >= min && blue <= max) { 
            
            // Calculation to find rho, gamma, and beta
            let formula = 1 / (red + blue + green);

            rho = formula * red;
            gamma = formula * green;
            beta = formula * blue;

            outputText = "rho: " + rho + "<br>gamma: " + gamma + "<br>beta: " + beta;

            visualize(red, green, blue);

            } else { 
                // number is not between min and max
                outputText = "Please enter a value between " + min + " and " + max + " into all fields.";
            }
        } else {
            // input is not a number
            outputText = "Please enter a valid number into all fields.";
        }

        document.getElementById("outputMessage").innerHTML = outputText;
    }

    function visualize(red, green, blue) {
        let color = "rgb(" + red + ", " + green + ", " + blue + ")";
        console.log(color);

        document.getElementById("colorBox").style.backgroundColor = color;
        document.getElementById("colorBox").style.height = "5em";
        document.getElementById("colorBox").style.width = "5em";
        document.getElementById("colorBox").style.border = "solid black";
    }
</script>
